name: Publish to PyPI and Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  pypi-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  windows-exe:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          uv sync --extra gui
          uv pip install pefile

      - name: Build exe with Nuitka
        run: uv run nuitka src/pypitravel/ --onefile --output-dir=build --python-flag=-m --no-deployment-flag=excluded-module-usage --include-data-dir=src/pypitravel/static=pypitravel/static --include-package=fastapi --include-package=uvicorn --include-package=httpx --include-package=webview --disable-plugins=pywebview --nofollow-import-to=webview.platforms.android --nofollow-import-to=webview.platforms.cocoa --nofollow-import-to=webview.platforms.gtk --nofollow-import-to=webview.platforms.qt --nofollow-import-to=webview.platforms.cef

      - name: Upload exe to Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/pypitravel.dist/pypitravel.exe
