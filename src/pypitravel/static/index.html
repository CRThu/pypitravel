<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyPitravel - 圆周旅迹行程规划</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <link href="https://unpkg.com/maplibre-gl@^5.24.0/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@^5.24.0/dist/maplibre-gl.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- 顶部标题栏 -->
    <header class="bg-gradient-to-r from-blue-600 to-blue-800 text-white shadow-lg">
        <div class="max-w-6xl mx-auto px-6 py-4">
            <h1 class="text-2xl font-bold">PyPitravel</h1>
            <p class="text-blue-100 text-sm">圆周旅迹行程规划与可视化</p>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="max-w-6xl mx-auto px-6 py-8">
        <!-- 控制区：两栏布局 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <!-- 缓存行程卡片 -->
            <div class="bg-white rounded-xl shadow-md p-6">
                <div class="flex items-center mb-4">
                    <span class="text-2xl mr-3">📁</span>
                    <h2 class="text-lg font-semibold text-gray-800">已缓存行程</h2>
                </div>
                <div class="space-y-3">
                    <select id="cacheSelector" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
                        <option value="">-- 请选择行程 --</option>
                    </select>
                    <button id="loadCacheBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-4 rounded-lg transition duration-200 transform hover:scale-[1.02]">
                        加载选中行程
                    </button>
                </div>
            </div>

            <!-- 解析新行程卡片 -->
            <div class="bg-white rounded-xl shadow-md p-6">
                <div class="flex items-center mb-4">
                    <span class="text-2xl mr-3">🔗</span>
                    <h2 class="text-lg font-semibold text-gray-800">解析新行程</h2>
                </div>
                <div class="space-y-3">
                    <input type="text" id="urlInput" 
                        placeholder="粘贴行程链接或输入ID，如：123456"
                        class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
                    <div class="flex items-center gap-4">
                        <label class="flex items-center text-sm text-gray-600 cursor-pointer">
                            <input type="checkbox" id="forceRefresh" class="mr-2 rounded text-blue-600 focus:ring-blue-500">
                            强制刷新
                        </label>
                        <button id="fetchUrlBtn" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-medium py-2.5 px-4 rounded-lg transition duration-200 transform hover:scale-[1.02]">
                            解析行程
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 表格区域 -->
        <div id="summaryContainer" class="bg-white rounded-xl shadow-md overflow-hidden">
            <!-- 表格内容动态加载 -->
        </div>

        <!-- 地图区域 -->
        <div id="mapContainer" class="bg-white rounded-xl shadow-md overflow-hidden mt-6" style="display:none">
            <div class="border-b border-gray-200 px-6 py-3 flex items-center justify-between">
                <h2 class="text-lg font-semibold text-gray-800">路线地图</h2>
                <div id="dayFilter" class="flex flex-wrap gap-1"></div>
            </div>
            <div id="map" style="width:100%; height:600px;"></div>
        </div>
    </main>

    <!-- Toast 提示 -->
    <div id="toast" class="fixed top-4 right-4 bg-red-500 text-white px-6 py-3 rounded-lg shadow-lg opacity-0 pointer-events-none transition-all duration-300 z-50">
        <span id="toastMessage"></span>
    </div>

    <script>
        let currentData = null;

        // Toast 提示函数
        function showToast(message, type = 'error') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            toastMessage.textContent = message;
            toast.className = `fixed top-4 right-4 text-white px-6 py-3 rounded-lg shadow-lg transition-all duration-300 z-50 ${type === 'error' ? 'bg-red-500' : 'bg-green-500'}`;
            toast.classList.remove('opacity-0', 'pointer-events-none');
            toast.classList.add('opacity-100');
            setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0', 'pointer-events-none');
            }, 3000);
        }

        // 加载缓存列表
        async function loadCacheList() {
            try {
                const res = await fetch('/api/cached-journeys');
                const data = await res.json();
                const selector = document.getElementById('cacheSelector');
                selector.innerHTML = '<option value="">-- 请选择行程 --</option>';
                data.journeys.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item.id;
                    option.text = `${item.name} | ${item.id}`;
                    selector.appendChild(option);
                });
            } catch (e) {
                console.error('加载缓存列表失败:', e);
            }
        }
        loadCacheList();

        // 格式化时间戳
        function formatTime(timestamp) {
            if (!timestamp) return "";
            const date = new Date(timestamp);
            return `${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
        }

        // 渲染行程摘要表格
        function renderSummaryTable(data) {
            currentData = data;
            const container = document.getElementById('summaryContainer');
            
            if (data.error) {
                container.innerHTML = `
                    <div class="p-6">
                        <div class="bg-red-50 border border-red-200 rounded-lg p-4">
                            <p class="text-red-700">❌ ${data.error}</p>
                        </div>
                    </div>`;
                return;
            }

            let html = `
                <div class="border-b border-gray-200 px-6 py-4 flex items-center justify-between">
                    <div>
                        <h2 class="text-xl font-bold text-gray-800">📋 ${data.journey_name}</h2>
                        <p class="text-sm text-gray-500 mt-1">共 ${data.total_days} 天 · ${data.total_events} 个事件</p>
                    </div>
                    <button id="exportBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2 px-5 rounded-lg transition duration-200">
                        导出 XLSX
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full border-collapse">
                        <thead class="bg-gray-50 border-b-2 border-gray-200">
                            <tr>
                                <th class="px-4 py-2 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider w-36 border-r border-gray-200">日期/计划</th>
                                <th class="px-4 py-2 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">事件内容</th>
                            </tr>
                        </thead>
                        <tbody>`;
            
            data.daily_summaries.forEach((day, dayIdx) => {
                day.events.forEach((event, index) => {
                    let displayName = event.name;
                    if (event.note && event.note.trim() !== "") {
                        displayName += ` <span class="text-gray-400">(${event.note})</span>`;
                    }
                    if (event.transport_num) {
                        const startTime = formatTime(event.transport_start_time);
                        const endTime = formatTime(event.transport_end_time);
                        displayName += ` <span class="inline-flex items-center bg-blue-50 text-blue-700 text-xs px-2 py-0.5 rounded ml-2 font-mono">${event.transport_num} ${startTime}-${endTime}</span>`;
                    }

                    const bgColor = dayIdx % 2 === 0 ? 'bg-white' : 'bg-gray-50/50';
                    const isDayStart = index === 0;
                    html += `<tr class="${bgColor} border-b border-gray-100 hover:bg-blue-50/60 transition-colors">
                                <td class="px-4 py-1.5 text-sm font-medium align-top border-r border-gray-100 ${isDayStart ? 'text-gray-900' : 'text-gray-400'}">
                                    ${isDayStart ? `<span class="inline-block bg-blue-50 text-blue-700 px-2 py-0.5 rounded text-xs font-bold">${day.day_plan_name}</span>` : ''}
                                </td>
                                <td class="px-4 py-1.5 text-sm text-gray-700">${displayName}</td>
                             </tr>`;
                });
            });
            
            html += `</tbody></table></div>`;
            container.innerHTML = html;

            // 绑定导出按钮事件
            document.getElementById('exportBtn').onclick = exportXLSX;
        }

        // XLSX 导出
        function exportXLSX() {
            if (!currentData) return;
            
            const rows = [];
            const merges = [];
            const styles = [];
            
            // 表头样式
            const headerStyle = {
                font: { bold: true, color: { rgb: "FFFFFF" }, size: 11, name: "微软雅黑" },
                fill: { fgColor: { rgb: "2563EB" } },
                alignment: { horizontal: "center", vertical: "center" },
                border: {
                    bottom: { style: "thin", color: { rgb: "1D4ED8" } }
                }
            };
            
            // 日期单元格样式
            const dateStyle = {
                font: { bold: true, color: { rgb: "2563EB" }, size: 10, name: "微软雅黑" },
                fill: { fgColor: { rgb: "EFF6FF" } },
                alignment: { horizontal: "center", vertical: "center", wrapText: true },
                border: {
                    right: { style: "thin", color: { rgb: "DBEAFE" } }
                }
            };
            
            // 内容单元格样式
            const contentStyle = {
                font: { size: 10, name: "微软雅黑" },
                alignment: { vertical: "center", wrapText: true },
                border: {
                    bottom: { style: "thin", color: { rgb: "E5E7EB" } }
                }
            };
            
            // 事件内容样式（交通信息高亮）
            const transportStyle = {
                font: { size: 10, name: "微软雅黑", color: { rgb: "1E40AF" } },
                alignment: { vertical: "center", wrapText: true },
                border: {
                    bottom: { style: "thin", color: { rgb: "E5E7EB" } }
                }
            };

            // 添加表头
            rows.push(["日期/计划", "事件内容"]);
            styles.push([headerStyle, headerStyle]);
            
            currentData.daily_summaries.forEach(day => {
                const startRow = rows.length;
                day.events.forEach((event, index) => {
                    const planName = (index === 0) ? day.day_plan_name : "";
                    let displayName = event.name;
                    if (event.note && event.note.trim() !== "") {
                        displayName += ` (${event.note})`;
                    }
                    let hasTransport = false;
                    if (event.transport_num) {
                        const startTime = formatTime(event.transport_start_time);
                        const endTime = formatTime(event.transport_end_time);
                        displayName += `  ${event.transport_num}  ${startTime}-${endTime}`;
                        hasTransport = true;
                    }
                    rows.push([planName, displayName]);
                    styles.push([dateStyle, hasTransport ? transportStyle : contentStyle]);
                });
                // 合并日期列
                if (day.events.length > 1) {
                    merges.push({ s: { r: startRow, c: 0 }, e: { r: startRow + day.events.length - 1, c: 0 } });
                }
            });

            const ws = XLSX.utils.aoa_to_sheet(rows);
            
            // 应用合并单元格
            ws['!merges'] = merges;
            
            // 设置列宽
            ws['!cols'] = [
                { wch: 16 },  // 日期列
                { wch: 60 }   // 内容列
            ];
            
            // 应用单元格样式
            for (let r = 0; r < rows.length; r++) {
                for (let c = 0; c < rows[r].length; c++) {
                    const cell = XLSX.utils.encode_cell({ r, c });
                    if (!ws[cell]) ws[cell] = { v: rows[r][c] };
                    ws[cell].s = styles[r][c];
                }
            }
            
            // 设置行高
            ws['!rows'] = rows.map((_, i) => i === 0 ? { hpt: 28 } : { hpt: 22 });
            
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "行程");
            XLSX.writeFile(wb, `${currentData.journey_name}.xlsx`);
        }

        // 加载缓存行程
        document.getElementById('loadCacheBtn').onclick = async () => {
            const journeyId = document.getElementById('cacheSelector').value;
            if (!journeyId) {
                showToast("请先选择一个行程");
                return;
            }
            try {
                const res = await fetch(`/api/journey/summary?journey_id=${journeyId}`);
                renderSummaryTable(await res.json());
                onJourneyLoaded(journeyId);
            } catch (e) {
                showToast("加载行程失败: " + e.message);
            }
        };

        // 解析新行程
        document.getElementById('fetchUrlBtn').onclick = async () => {
            const url = document.getElementById('urlInput').value.trim();
            const match = url.match(/(?:detail\/|journey_id=)(\d+)/);
            const journeyId = match ? match[1] : (/^\d+$/.test(url) ? url : null);

            if (!journeyId) {
                showToast("请输入有效的行程链接或数字ID");
                return;
            }

            try {
                const response = await fetch(`/api/journey?journey_id=${journeyId}&force_refresh=${document.getElementById('forceRefresh').checked}`);
                const result = await response.json();

                if (result.error) {
                    showToast(result.error);
                    return;
                }

                const res = await fetch(`/api/journey/summary?journey_id=${journeyId}`);
                renderSummaryTable(await res.json());
                loadCacheList();
                onJourneyLoaded(journeyId);
            } catch (e) {
                showToast("解析行程失败: " + e.message);
            }
        };

        // ========== 地图模块 ==========
        let map = null;
        let currentMapData = null;
        const DAY_COLORS = [
            '#3B82F6','#EF4444','#10B981','#F59E0B','#8B5CF6',
            '#EC4899','#06B6D4','#84CC16','#F97316','#6366F1'
        ];
        const ROUTE_STYLES = {
            flight:  { color: '#3B82F6', width: 2.5, dasharray: [8, 4] },
            train:   { color: '#10B981', width: 3, dasharray: null },
            driving: { color: '#F59E0B', width: 3, dasharray: null },
            walking: { color: '#9CA3AF', width: 1.5, dasharray: [4, 3] },
            transfer:{ color: '#8B5CF6', width: 2, dasharray: [6, 3] },
        };

        // --- eviltransform: GCJ-02 → WGS-84 ---
        const _etEarthR = 6378137.0;
        function _etOutOfChina(lat, lng) {
            return lng < 72.004 || lng > 137.8347 || lat < 0.8293 || lat > 55.8271;
        }
        function _etTransform(x, y) {
            var xy = x * y, absX = Math.sqrt(Math.abs(x));
            var xPi = x * Math.PI, yPi = y * Math.PI;
            var d = 20*Math.sin(6*xPi) + 20*Math.sin(2*xPi);
            var lat = d + 20*Math.sin(yPi) + 40*Math.sin(yPi/3);
            var lng = d + 20*Math.sin(xPi) + 40*Math.sin(xPi/3);
            lat += 160*Math.sin(yPi/12) + 320*Math.sin(yPi/30);
            lng += 150*Math.sin(xPi/12) + 300*Math.sin(xPi/30);
            lat *= 2/3; lng *= 2/3;
            lat += -100 + 2*x + 3*y + 0.2*y*y + 0.1*xy + 0.2*Math.sqrt(absX);
            lng += 300 + x + 2*y + 0.1*x*x + 0.1*xy + 0.1*Math.sqrt(absX);
            return { lat, lng };
        }
        function _etDelta(lat, lng) {
            var ee = 0.00669342162296594323;
            var d = _etTransform(lng - 105, lat - 35);
            var radLat = lat / 180 * Math.PI;
            var magic = Math.sin(radLat);
            magic = 1 - ee * magic * magic;
            var sqrtM = Math.sqrt(magic);
            d.lat = (d.lat * 180) / ((_etEarthR * (1 - ee)) / (magic * sqrtM) * Math.PI);
            d.lng = (d.lng * 180) / (_etEarthR / sqrtM * Math.cos(radLat) * Math.PI);
            return d;
        }
        function gcj2wgs(gcjLat, gcjLng) {
            if (_etOutOfChina(gcjLat, gcjLng)) return { lat: gcjLat, lng: gcjLng };
            var d = _etDelta(gcjLat, gcjLng);
            return { lat: gcjLat - d.lat, lng: gcjLng - d.lng };
        }
        function toWGS(lat, lng, coordType) {
            if (coordType === 'GCJ02') {
                var r = gcj2wgs(lat, lng);
                return [r.lng, r.lat];
            }
            return [lng, lat];
        }

        // --- 大圆弧（飞机航线）---
        function greatCircleArc(start, end, n = 50) {
            var coords = [];
            var toRad = Math.PI / 180;
            var lat1 = start[1] * toRad, lng1 = start[0] * toRad;
            var lat2 = end[1] * toRad, lng2 = end[0] * toRad;
            var d = 2 * Math.asin(Math.sqrt(
                Math.pow(Math.sin((lat2-lat1)/2), 2) +
                Math.cos(lat1) * Math.cos(lat2) * Math.pow(Math.sin((lng2-lng1)/2), 2)
            ));
            if (d < 0.0001) return [start, end];
            for (var i = 0; i <= n; i++) {
                var f = i / n;
                var A = Math.sin((1-f)*d) / Math.sin(d);
                var B = Math.sin(f*d) / Math.sin(d);
                var x = A * Math.cos(lat1) * Math.cos(lng1) + B * Math.cos(lat2) * Math.cos(lng2);
                var y = A * Math.cos(lat1) * Math.sin(lng1) + B * Math.cos(lat2) * Math.sin(lng2);
                var z = A * Math.sin(lat1) + B * Math.sin(lat2);
                coords.push([Math.atan2(y, x) / toRad, Math.atan2(z, Math.sqrt(x*x + y*y)) / toRad]);
            }
            return coords;
        }

        // --- Haversine 距离 ---
        function haverDist(a, b) {
            var R = 6371000, p = Math.PI / 180;
            var h = 0.5 - Math.cos((b[1]-a[1])*p)/2 + Math.cos(a[1]*p)*Math.cos(b[1]*p)*(1-Math.cos((b[0]-a[0])*p))/2;
            return 2 * R * Math.asin(Math.sqrt(h));
        }

        // --- OSRM 路由 ---
        const _osrmCache = {};
        async function fetchOSRM(start, end) {
            var key = start[0]+','+start[1]+';'+end[0]+','+end[1];
            if (_osrmCache[key]) return _osrmCache[key];
            try {
                var url = `https://router.project-osrm.org/route/v1/driving/${start[0]},${start[1]};${end[0]},${end[1]}?overview=full&geometries=geojson`;
                var res = await fetch(url);
                var data = await res.json();
                if (data.code === 'Ok' && data.routes.length) {
                    var coords = data.routes[0].geometry.coordinates;
                    _osrmCache[key] = coords;
                    return coords;
                }
            } catch (e) { console.warn('OSRM failed:', e); }
            return [start, end];
        }

        // --- 初始化地图 ---
        var mapReady = null;
        function initMap() {
            if (map) return mapReady;
            map = new maplibregl.Map({
                container: 'map',
                style: 'https://tiles.openfreemap.org/styles/liberty',
                center: [10, 48],
                zoom: 4
            });
            map.addControl(new maplibregl.NavigationControl());
            map.addControl(new maplibregl.ScaleControl());
            mapReady = new Promise(resolve => map.on('load', resolve));
            return mapReady;
        }

        // --- 清除地图图层 ---
        function clearMapLayers() {
            if (!map || !map.isStyleLoaded()) return;
            var style = map.getStyle();
            if (!style) return;
            var srcIds = [];
            style.sources && Object.keys(style.sources).forEach(k => {
                if (k.startsWith('route-') || k.startsWith('poi-')) srcIds.push(k);
            });
            style.layers && style.layers.forEach(l => {
                if (l.id && (l.id.startsWith('route-') || l.id.startsWith('poi-'))) {
                    map.removeLayer(l.id);
                }
            });
            srcIds.forEach(id => { try { map.removeSource(id); } catch(e){} });
            // 移除旧 markers
            document.querySelectorAll('.maplibregl-marker').forEach(m => m.remove());
        }

        // --- 绘制单条路线 ---
        async function drawRoute(eA, eB, mode, dayIdx, routeIdx) {
            if (!eA.start || !eB.start) return;
            var from = toWGS(eA.start.lat, eA.start.lng, eA.start.coord_type);
            var to = toWGS(eB.start.lat, eB.start.lng, eB.start.coord_type);
            var style = ROUTE_STYLES[mode] || ROUTE_STYLES.walking;
            var coords;

            if (mode === 'flight') {
                coords = greatCircleArc(from, to);
            } else if (mode === 'driving' || mode === 'train') {
                coords = await fetchOSRM(from, to);
            } else {
                coords = [from, to];
            }

            var srcId = 'route-' + dayIdx + '-' + routeIdx;
            map.addSource(srcId, { type: 'geojson', data: { type: 'Feature', geometry: { type: 'LineString', coordinates: coords } } });
            map.addLayer({
                id: srcId,
                type: 'line',
                source: srcId,
                paint: {
                    'line-color': style.color,
                    'line-width': style.width,
                    'line-dasharray': style.dasharray || [1],
                }
            });
        }

        // --- 添加标记点 ---
        function addMarker(poi, label, dayIdx, event) {
            if (!poi) return;
            var coords = toWGS(poi.lat, poi.lng, poi.coord_type);
            var color = DAY_COLORS[dayIdx % DAY_COLORS.length];
            var el = document.createElement('div');
            el.style.cssText = `background:${color};color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.3);cursor:pointer;`;
            el.textContent = label;

            var popupHtml = `<div style="font-size:13px;max-width:220px">`
                + `<b>${poi.name}</b>`
                + (event.transport_num ? `<br><span style="color:#2563eb">${event.transport_num}</span>` : '')
                + `</div>`;

            new maplibregl.Marker({ element: el })
                .setLngLat(coords)
                .setPopup(new maplibregl.Popup({ offset: 10 }).setHTML(popupHtml))
                .addTo(map);
        }

        // --- 加载地图数据并绘制 ---
        async function loadMapData(journeyId) {
            try {
                var res = await fetch(`/api/journey/map?journey_id=${journeyId}`);
                var data = await res.json();
                if (data.error) return;
                currentMapData = data;
                await initMap();
                clearMapLayers();
                renderMap();
            } catch (e) {
                console.error('加载地图数据失败:', e);
            }
        }

        // --- 渲染地图（带筛选） ---
        async function renderMap() {
            if (!map || !currentMapData) return;
            clearMapLayers();
            var filterEl = document.getElementById('dayFilter');
            var checkedDays = new Set();
            filterEl.querySelectorAll('input[type=checkbox]:checked').forEach(cb => checkedDays.add(cb.value));
            if (checkedDays.size === 0) currentMapData.days.forEach((d, i) => checkedDays.add(String(i)));

            var allCoords = [];
            var poiIdx = 0;
            var routeIdx = 0;
            var drawPromises = [];

            for (var di = 0; di < currentMapData.days.length; di++) {
                if (!checkedDays.has(String(di))) continue;
                var day = currentMapData.days[di];
                var events = day.events;
                for (var ei = 0; ei < events.length; ei++) {
                    var ev = events[ei];
                    if (ev.start) {
                        var c = toWGS(ev.start.lat, ev.start.lng, ev.start.coord_type);
                        allCoords.push(c);
                        poiIdx++;
                        addMarker(ev.start, String(poiIdx), di, ev);
                    }
                    if (ei < events.length - 1 && ev.transport_mode) {
                        var nextEv = events[ei + 1];
                        if (nextEv.start) {
                            drawPromises.push(drawRoute(ev, nextEv, ev.transport_mode, di, routeIdx++));
                        }
                    }
                }
            }

            await Promise.all(drawPromises);

            if (allCoords.length > 0) {
                var bounds = new maplibregl.LngLatBounds();
                allCoords.forEach(c => bounds.extend(c));
                map.fitBounds(bounds, { padding: 40, maxZoom: 12 });
            }
        }

        // --- 构建日期筛选器 ---
        function buildDayFilter() {
            if (!currentMapData) return;
            var el = document.getElementById('dayFilter');
            el.innerHTML = '';
            currentMapData.days.forEach((day, i) => {
                var cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.value = String(i);
                cb.checked = true;
                cb.className = 'rounded text-blue-600';
                cb.id = 'daycb-' + i;
                cb.onchange = () => renderMap();
                var label = document.createElement('label');
                label.htmlFor = cb.id;
                label.className = 'text-xs text-gray-600 cursor-pointer mr-2';
                label.textContent = day.day_plan_name.split(' ')[0];
                el.appendChild(cb);
                el.appendChild(label);
            });
        }

        // ========== 入口：加载行程后同时加载地图 ==========
        var _lastLoadedJourneyId = null;

        function onJourneyLoaded(journeyId) {
            _lastLoadedJourneyId = journeyId;
            document.getElementById('mapContainer').style.display = '';
            loadMapData(journeyId).then(() => {
                buildDayFilter();
            });
        }

        // 输入框回车触发解析
        document.getElementById('urlInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('fetchUrlBtn').click();
            }
        });
    </script>
</body>
