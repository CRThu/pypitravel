<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyPitravel - 圆周旅迹行程规划</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- 顶部标题栏 -->
    <header class="bg-gradient-to-r from-blue-600 to-blue-800 text-white shadow-lg">
        <div class="max-w-6xl mx-auto px-6 py-4">
            <h1 class="text-2xl font-bold">PyPitravel</h1>
            <p class="text-blue-100 text-sm">圆周旅迹行程规划与可视化</p>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="max-w-6xl mx-auto px-6 py-8">
        <!-- 控制区：两栏布局 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <!-- 缓存行程卡片 -->
            <div class="bg-white rounded-xl shadow-md p-6">
                <div class="flex items-center mb-4">
                    <span class="text-2xl mr-3">📁</span>
                    <h2 class="text-lg font-semibold text-gray-800">已缓存行程</h2>
                </div>
                <div class="space-y-3">
                    <select id="cacheSelector" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
                        <option value="">-- 请选择行程 --</option>
                    </select>
                    <button id="loadCacheBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-4 rounded-lg transition duration-200 transform hover:scale-[1.02]">
                        加载选中行程
                    </button>
                </div>
            </div>

            <!-- 解析新行程卡片 -->
            <div class="bg-white rounded-xl shadow-md p-6">
                <div class="flex items-center mb-4">
                    <span class="text-2xl mr-3">🔗</span>
                    <h2 class="text-lg font-semibold text-gray-800">解析新行程</h2>
                </div>
                <div class="space-y-3">
                    <input type="text" id="urlInput" 
                        placeholder="粘贴行程链接或输入ID，如：123456"
                        class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
                    <div class="flex items-center gap-4">
                        <label class="flex items-center text-sm text-gray-600 cursor-pointer">
                            <input type="checkbox" id="forceRefresh" class="mr-2 rounded text-blue-600 focus:ring-blue-500">
                            强制刷新
                        </label>
                        <button id="fetchUrlBtn" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-medium py-2.5 px-4 rounded-lg transition duration-200 transform hover:scale-[1.02]">
                            解析行程
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 表格区域 -->
        <div id="summaryContainer" class="bg-white rounded-xl shadow-md overflow-hidden">
            <!-- 表格内容动态加载 -->
        </div>
    </main>

    <!-- Toast 提示 -->
    <div id="toast" class="fixed top-4 right-4 bg-red-500 text-white px-6 py-3 rounded-lg shadow-lg opacity-0 pointer-events-none transition-all duration-300 z-50">
        <span id="toastMessage"></span>
    </div>

    <script>
        let currentData = null;

        // Toast 提示函数
        function showToast(message, type = 'error') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            toastMessage.textContent = message;
            toast.className = `fixed top-4 right-4 text-white px-6 py-3 rounded-lg shadow-lg transition-all duration-300 z-50 ${type === 'error' ? 'bg-red-500' : 'bg-green-500'}`;
            toast.classList.remove('opacity-0', 'pointer-events-none');
            toast.classList.add('opacity-100');
            setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0', 'pointer-events-none');
            }, 3000);
        }

        // 加载缓存列表
        async function loadCacheList() {
            try {
                const res = await fetch('/api/cached-journeys');
                const data = await res.json();
                const selector = document.getElementById('cacheSelector');
                selector.innerHTML = '<option value="">-- 请选择行程 --</option>';
                data.journeys.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item.id;
                    option.text = `${item.name} | ${item.id}`;
                    selector.appendChild(option);
                });
            } catch (e) {
                console.error('加载缓存列表失败:', e);
            }
        }
        loadCacheList();

        // 格式化时间戳
        function formatTime(timestamp) {
            if (!timestamp) return "";
            const date = new Date(timestamp);
            return `${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
        }

        // 渲染行程摘要表格
        function renderSummaryTable(data) {
            currentData = data;
            const container = document.getElementById('summaryContainer');
            
            if (data.error) {
                container.innerHTML = `
                    <div class="p-6">
                        <div class="bg-red-50 border border-red-200 rounded-lg p-4">
                            <p class="text-red-700">❌ ${data.error}</p>
                        </div>
                    </div>`;
                return;
            }

            let html = `
                <div class="border-b border-gray-200 px-6 py-4 flex items-center justify-between">
                    <div>
                        <h2 class="text-xl font-bold text-gray-800">📋 ${data.journey_name}</h2>
                        <p class="text-sm text-gray-500 mt-1">共 ${data.total_days} 天 · ${data.total_events} 个事件</p>
                    </div>
                    <button id="exportBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2 px-5 rounded-lg transition duration-200">
                        导出 XLSX
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full border-collapse">
                        <thead class="bg-gray-50 border-b-2 border-gray-200">
                            <tr>
                                <th class="px-4 py-2 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider w-36 border-r border-gray-200">日期/计划</th>
                                <th class="px-4 py-2 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">事件内容</th>
                            </tr>
                        </thead>
                        <tbody>`;
            
            data.daily_summaries.forEach((day, dayIdx) => {
                day.events.forEach((event, index) => {
                    let displayName = event.name;
                    if (event.note && event.note.trim() !== "") {
                        displayName += ` <span class="text-gray-400">(${event.note})</span>`;
                    }
                    if (event.transport_num) {
                        const startTime = formatTime(event.transport_start_time);
                        const endTime = formatTime(event.transport_end_time);
                        displayName += ` <span class="inline-flex items-center bg-blue-50 text-blue-700 text-xs px-2 py-0.5 rounded ml-2 font-mono">${event.transport_num} ${startTime}-${endTime}</span>`;
                    }

                    const bgColor = dayIdx % 2 === 0 ? 'bg-white' : 'bg-gray-50/50';
                    const isDayStart = index === 0;
                    html += `<tr class="${bgColor} border-b border-gray-100 hover:bg-blue-50/60 transition-colors">
                                <td class="px-4 py-1.5 text-sm font-medium align-top border-r border-gray-100 ${isDayStart ? 'text-gray-900' : 'text-gray-400'}">
                                    ${isDayStart ? `<span class="inline-block bg-blue-50 text-blue-700 px-2 py-0.5 rounded text-xs font-bold">${day.day_plan_name}</span>` : ''}
                                </td>
                                <td class="px-4 py-1.5 text-sm text-gray-700">${displayName}</td>
                             </tr>`;
                });
            });
            
            html += `</tbody></table></div>`;
            container.innerHTML = html;

            // 绑定导出按钮事件
            document.getElementById('exportBtn').onclick = exportXLSX;
        }

        // XLSX 导出
        function exportXLSX() {
            if (!currentData) return;
            
            const rows = [];
            const merges = [];
            const styles = [];
            
            // 表头样式
            const headerStyle = {
                font: { bold: true, color: { rgb: "FFFFFF" }, size: 11, name: "微软雅黑" },
                fill: { fgColor: { rgb: "2563EB" } },
                alignment: { horizontal: "center", vertical: "center" },
                border: {
                    bottom: { style: "thin", color: { rgb: "1D4ED8" } }
                }
            };
            
            // 日期单元格样式
            const dateStyle = {
                font: { bold: true, color: { rgb: "2563EB" }, size: 10, name: "微软雅黑" },
                fill: { fgColor: { rgb: "EFF6FF" } },
                alignment: { horizontal: "center", vertical: "center", wrapText: true },
                border: {
                    right: { style: "thin", color: { rgb: "DBEAFE" } }
                }
            };
            
            // 内容单元格样式
            const contentStyle = {
                font: { size: 10, name: "微软雅黑" },
                alignment: { vertical: "center", wrapText: true },
                border: {
                    bottom: { style: "thin", color: { rgb: "E5E7EB" } }
                }
            };
            
            // 事件内容样式（交通信息高亮）
            const transportStyle = {
                font: { size: 10, name: "微软雅黑", color: { rgb: "1E40AF" } },
                alignment: { vertical: "center", wrapText: true },
                border: {
                    bottom: { style: "thin", color: { rgb: "E5E7EB" } }
                }
            };

            // 添加表头
            rows.push(["日期/计划", "事件内容"]);
            styles.push([headerStyle, headerStyle]);
            
            currentData.daily_summaries.forEach(day => {
                const startRow = rows.length;
                day.events.forEach((event, index) => {
                    const planName = (index === 0) ? day.day_plan_name : "";
                    let displayName = event.name;
                    if (event.note && event.note.trim() !== "") {
                        displayName += ` (${event.note})`;
                    }
                    let hasTransport = false;
                    if (event.transport_num) {
                        const startTime = formatTime(event.transport_start_time);
                        const endTime = formatTime(event.transport_end_time);
                        displayName += `  ${event.transport_num}  ${startTime}-${endTime}`;
                        hasTransport = true;
                    }
                    rows.push([planName, displayName]);
                    styles.push([dateStyle, hasTransport ? transportStyle : contentStyle]);
                });
                // 合并日期列
                if (day.events.length > 1) {
                    merges.push({ s: { r: startRow, c: 0 }, e: { r: startRow + day.events.length - 1, c: 0 } });
                }
            });

            const ws = XLSX.utils.aoa_to_sheet(rows);
            
            // 应用合并单元格
            ws['!merges'] = merges;
            
            // 设置列宽
            ws['!cols'] = [
                { wch: 16 },  // 日期列
                { wch: 60 }   // 内容列
            ];
            
            // 应用单元格样式
            for (let r = 0; r < rows.length; r++) {
                for (let c = 0; c < rows[r].length; c++) {
                    const cell = XLSX.utils.encode_cell({ r, c });
                    if (!ws[cell]) ws[cell] = { v: rows[r][c] };
                    ws[cell].s = styles[r][c];
                }
            }
            
            // 设置行高
            ws['!rows'] = rows.map((_, i) => i === 0 ? { hpt: 28 } : { hpt: 22 });
            
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "行程");
            XLSX.writeFile(wb, `${currentData.journey_name}.xlsx`);
        }

        // 加载缓存行程
        document.getElementById('loadCacheBtn').onclick = async () => {
            const journeyId = document.getElementById('cacheSelector').value;
            if (!journeyId) {
                showToast("请先选择一个行程");
                return;
            }
            try {
                const res = await fetch(`/api/journey/summary?journey_id=${journeyId}`);
                renderSummaryTable(await res.json());
            } catch (e) {
                showToast("加载行程失败: " + e.message);
            }
        };

        // 解析新行程
        document.getElementById('fetchUrlBtn').onclick = async () => {
            const url = document.getElementById('urlInput').value.trim();
            const match = url.match(/(?:detail\/|journey_id=)(\d+)/);
            const journeyId = match ? match[1] : (/^\d+$/.test(url) ? url : null);
            
            if (!journeyId) {
                showToast("请输入有效的行程链接或数字ID");
                return;
            }
            
            try {
                const response = await fetch(`/api/journey?journey_id=${journeyId}&force_refresh=${document.getElementById('forceRefresh').checked}`);
                const result = await response.json();
                
                if (result.error) {
                    showToast(result.error);
                    return;
                }
                
                const res = await fetch(`/api/journey/summary?journey_id=${journeyId}`);
                renderSummaryTable(await res.json());
                loadCacheList();
            } catch (e) {
                showToast("解析行程失败: " + e.message);
            }
        };

        // 输入框回车触发解析
        document.getElementById('urlInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('fetchUrlBtn').click();
            }
        });
    </script>
</body>
</html>
