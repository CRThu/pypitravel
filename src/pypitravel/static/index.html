<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyPitravel - 圆周旅迹行程规划</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <link href="https://unpkg.com/maplibre-gl@^5.24.0/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@^5.24.0/dist/maplibre-gl.js"></script>
    <style>
        .tab-btn {
            padding: 4px 12px;
            font-size: 13px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            color: #BFDBFE;
            background: transparent;
            border: 1px solid transparent;
        }
        .tab-btn:hover {
            color: #fff;
            background: rgba(255,255,255,0.15);
        }
        .tab-btn.active {
            color: #1D4ED8;
            background: #fff;
            border-color: #93C5FD;
        }
        #dayFilter label {
            color: #E0E7FF;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
        }
        #dayFilter label:hover {
            color: #fff;
        }
        #dayFilter input[type="checkbox"] {
            accent-color: #60A5FA;
        }
        #summaryContainer table thead,
        #summaryContainerTab table thead {
            position: sticky;
            top: 0;
            z-index: 10;
            background: #F9FAFB;
        }
        /* 拖动分隔条 */
        .panel-resizer {
            width: 6px;
            cursor: col-resize;
            background: #E5E7EB;
            flex-shrink: 0;
            position: relative;
            transition: background 0.15s;
        }
        .panel-resizer:hover,
        .panel-resizer.active {
            background: #3B82F6;
        }
        .panel-resizer::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 2px;
            height: 24px;
            background: #9CA3AF;
            border-radius: 1px;
        }
        .panel-resizer:hover::after,
        .panel-resizer.active::after {
            background: #fff;
        }
        /* 日期筛选：点击日期文字滚动到当天 */
        #dayFilter label.day-label {
            transition: color 0.15s;
        }
        #dayFilter label.day-label:hover {
            color: #fff !important;
            text-decoration: underline;
        }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col overflow-hidden">
    <!-- 顶部标题栏 + 控制区 -->
    <header class="bg-gradient-to-r from-blue-600 to-blue-800 text-white shadow-lg flex-shrink-0">
        <!-- 第一行：品牌 + 操作 + Tab -->
        <div class="max-w-[1800px] mx-auto px-4 py-2 flex flex-wrap items-center gap-2.5">
            <h1 class="text-lg font-bold whitespace-nowrap flex-shrink-0">PyPitravel</h1>
            <div class="w-px h-5 bg-blue-400 flex-shrink-0"></div>
            <select id="cacheSelector" class="px-2 py-1 text-base text-gray-800 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 w-56 flex-shrink-0">
                <option value="">-- 请选择行程 --</option>
            </select>
            <button id="loadCacheBtn" class="bg-blue-500 hover:bg-blue-600 text-white text-sm font-medium py-1.5 px-4 rounded transition flex-shrink-0">
                加载
            </button>
            <div class="w-px h-5 bg-blue-400 flex-shrink-0"></div>
            <input type="text" id="urlInput"
                placeholder="粘贴行程链接或输入ID"
                class="px-3 py-1.5 text-base text-gray-800 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 w-48 flex-shrink-0">
            <label class="flex items-center text-sm text-blue-100 cursor-pointer whitespace-nowrap flex-shrink-0">
                <input type="checkbox" id="forceRefresh" class="mr-1 rounded text-blue-600">
                强制刷新
            </label>
            <button id="fetchUrlBtn" class="bg-green-500 hover:bg-green-600 text-white text-sm font-medium py-1.5 px-4 rounded transition flex-shrink-0">
                解析
            </button>
            <div class="w-px h-5 bg-blue-400 flex-shrink-0"></div>
            <div id="tabBar" class="flex items-center gap-1 flex-shrink-0">
                <button id="tabDual" class="tab-btn active" onclick="switchTab('dual')">双栏</button>
                <button id="tabTable" class="tab-btn" onclick="switchTab('table')">表格</button>
                <button id="tabMap" class="tab-btn" onclick="switchTab('map')">地图</button>
            </div>
        </div>
        <!-- 第二行：筛选栏 -->
        <div id="dayFilterWrap" class="max-w-[1800px] mx-auto px-4 pb-2 flex items-start gap-2">
            <div class="flex items-center gap-1.5 flex-shrink-0">
                <span class="text-sm text-blue-200 whitespace-nowrap">筛选:</span>
                <button id="selectAllBtn" class="text-sm text-blue-100 hover:text-white underline cursor-pointer whitespace-nowrap">全选</button>
                <button id="deselectAllBtn" class="text-sm text-blue-100 hover:text-white underline cursor-pointer whitespace-nowrap">全不选</button>
                <div class="w-px h-4 bg-blue-400"></div>
            </div>
            <div id="dayFilter" class="flex flex-wrap gap-x-1.5 gap-y-1 min-w-0"></div>
        </div>
    </header>

    <!-- 内容区：占满剩余视口 -->
    <main class="flex-1 min-h-0 p-3">
        <div id="contentArea" class="h-full rounded-xl shadow-md overflow-hidden bg-white">
            <div id="dualView" class="flex h-full">
                <div id="tableWrap" class="overflow-auto border-r border-gray-200" style="width:40%;flex-shrink:0">
                    <div id="summaryContainer"></div>
                </div>
                <div id="panelResizer" class="panel-resizer"></div>
                <div id="mapWrap" class="h-full flex-1 min-w-0">
                    <div id="map" style="width:100%; height:100%;"></div>
                </div>
            </div>
            <div id="tableView" class="h-full overflow-auto" style="display:none">
                <div id="summaryContainerTab"></div>
            </div>
            <div id="mapView" class="h-full" style="display:none">
                <div id="mapTab" style="width:100%; height:100%;"></div>
            </div>
        </div>
    </main>

    <!-- Toast 提示 -->
    <div id="toast" class="fixed top-4 right-4 bg-red-500 text-white px-6 py-3 rounded-lg shadow-lg opacity-0 pointer-events-none transition-all duration-300 z-50">
        <span id="toastMessage"></span>
    </div>

    <script>
        let currentData = null;

        // ========== Tab 切换 ==========
        let currentTab = 'dual';

        function switchTab(tab) {
            currentTab = tab;
            // 更新按钮状态
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');

            // 切换视图显示
            const dualView = document.getElementById('dualView');
            const tableView = document.getElementById('tableView');
            const mapView = document.getElementById('mapView');
            const dayFilterWrap = document.getElementById('dayFilterWrap');

            if (tab === 'dual') {
                dualView.style.display = 'flex';
                tableView.style.display = 'none';
                mapView.style.display = 'none';
                dayFilterWrap.style.display = 'flex';
                // 将地图移到 mapWrap 容器
                moveMapTo('mapWrap');
            } else if (tab === 'table') {
                dualView.style.display = 'none';
                tableView.style.display = 'block';
                mapView.style.display = 'none';
                dayFilterWrap.style.display = 'none';
                // 将表格移到 tableView 容器
                moveTableTo('summaryContainerTab');
            } else {
                dualView.style.display = 'none';
                tableView.style.display = 'none';
                mapView.style.display = 'block';
                dayFilterWrap.style.display = 'flex';
                // 将地图移到 mapView 容器
                moveMapTo('mapTab');
            }

            // 通知地图容器尺寸变化
            setTimeout(() => {
                if (map) map.resize();
            }, 100);
        }

        function moveMapTo(targetId) {
            const target = document.getElementById(targetId);
            const mapContainer = document.getElementById('map');
            if (target && mapContainer && target !== mapContainer) {
                target.appendChild(mapContainer);
                mapContainer.style.width = '100%';
                mapContainer.style.height = '100%';
            }
        }

        function moveTableTo(targetId) {
            const target = document.getElementById(targetId);
            const source = document.getElementById('summaryContainer');
            if (target && source && target !== source) {
                target.innerHTML = source.innerHTML;
                // 复制导出按钮事件
                const exportBtn = target.querySelector('#exportBtn');
                if (exportBtn) exportBtn.onclick = exportXLSX;
            }
        }

        // Toast 提示函数
        function showToast(message, type = 'error') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            toastMessage.textContent = message;
            toast.className = `fixed top-4 right-4 text-white px-6 py-3 rounded-lg shadow-lg transition-all duration-300 z-50 ${type === 'error' ? 'bg-red-500' : 'bg-green-500'}`;
            toast.classList.remove('opacity-0', 'pointer-events-none');
            toast.classList.add('opacity-100');
            setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0', 'pointer-events-none');
            }, 3000);
        }

        // 加载缓存列表
        async function loadCacheList() {
            try {
                const res = await fetch('/api/cached-journeys');
                const data = await res.json();
                const selector = document.getElementById('cacheSelector');
                selector.innerHTML = '<option value="">-- 请选择行程 --</option>';
                data.journeys.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item.id;
                    option.text = `${item.name} | ${item.id}`;
                    selector.appendChild(option);
                });
            } catch (e) {
                console.error('加载缓存列表失败:', e);
            }
        }
        loadCacheList();

        // 格式化时间戳
        function formatTime(timestamp) {
            if (!timestamp) return "";
            const date = new Date(timestamp);
            return `${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
        }

        // 渲染行程摘要表格
        function renderSummaryTable(data) {
            currentData = data;
            const container = document.getElementById('summaryContainer');
            const containerTab = document.getElementById('summaryContainerTab');

            // Build name → {lat,lng,coord_type} lookup from currentMapData
            var poiLookup = {};
            if (currentMapData && currentMapData.days) {
                currentMapData.days.forEach(day => {
                    day.events.forEach(ev => {
                        if (ev.start && ev.start.lat && ev.start.lng) {
                            poiLookup[ev.name] = ev.start;
                        }
                    });
                });
            }

            if (data.error) {
                const errorHtml = `
                    <div class="p-6">
                        <div class="bg-red-50 border border-red-200 rounded-lg p-4">
                            <p class="text-red-700">${data.error}</p>
                        </div>
                    </div>`;
                container.innerHTML = errorHtml;
                if (containerTab) containerTab.innerHTML = errorHtml;
                return;
            }

            let html = `
                <div class="border-b border-gray-200 px-6 py-4 flex items-center justify-between">
                    <div>
                        <h2 class="text-xl font-bold text-gray-800">📋 ${data.journey_name}</h2>
                        <p class="text-sm text-gray-500 mt-1">共 ${data.total_days} 天 · ${data.total_events} 个事件</p>
                    </div>
                    <button id="exportBtn" title="导出 Excel 表格" class="inline-flex items-center gap-1.5 text-sm font-medium text-emerald-700 bg-emerald-50 hover:bg-emerald-100 border border-emerald-200 hover:border-emerald-300 py-1.5 px-3 rounded-lg transition duration-200 cursor-pointer">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        <span>导出</span>
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full border-collapse">
                        <thead class="bg-gray-50 border-b-2 border-gray-200">
                            <tr>
                                <th class="px-4 py-2 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider w-36 border-r border-gray-200">日期/计划</th>
                                <th class="px-2 py-2 text-center text-xs font-semibold text-gray-500 uppercase tracking-wider w-8">#</th>
                                <th class="px-4 py-2 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">事件内容</th>
                            </tr>
                        </thead>
                        <tbody>`;
            
                    var rowIdx = 0;
            data.daily_summaries.forEach((day, dayIdx) => {
                day.events.forEach((event, index) => {
                    rowIdx++;
                    let displayName = event.name;
                    if (event.note && event.note.trim() !== "") {
                        displayName += ` <span class="text-gray-400">(${event.note})</span>`;
                    }
                    if (event.transport_num) {
                        const startTime = formatTime(event.transport_start_time);
                        const endTime = formatTime(event.transport_end_time);
                        displayName += ` <span class="inline-flex items-center bg-blue-50 text-blue-700 text-xs px-2 py-0.5 rounded ml-2 font-mono">${event.transport_num} ${startTime}-${endTime}</span>`;
                    }

                    var nameHtml = displayName;
                    var poi = poiLookup[event.name];
                    if (poi) {
                        var clickAction = `flyToPoi(${poi.lat},${poi.lng},'${poi.coord_type || ''}',${dayIdx})`;
                        nameHtml = `<span class="cursor-pointer hover:text-blue-600 hover:underline" onclick="${clickAction}" title="定位到地图">${displayName}</span>`;
                    }

                    const bgColor = dayIdx % 2 === 0 ? 'bg-white' : 'bg-gray-50/50';
                    const isDayStart = index === 0;
                    html += `<tr id="${isDayStart ? 'day-row-' + dayIdx : ''}" class="${bgColor} border-b border-gray-100 hover:bg-blue-50/60 transition-colors">
                                <td class="px-4 py-1.5 text-sm font-medium align-top border-r border-gray-100 ${isDayStart ? 'text-gray-900' : 'text-gray-400'}">
                                    ${isDayStart ? `<span class="inline-block bg-blue-50 text-blue-700 px-2 py-0.5 rounded text-xs font-bold">${day.day_plan_name}</span> <button class="text-xs cursor-pointer text-blue-400 hover:text-blue-700 ml-1" title="定位到 ${day.day_plan_name}" onclick="flyToDay(${dayIdx})">📍</button>` : ''}
                                </td>
                                <td class="px-1 py-1.5 text-sm text-center font-mono text-gray-400 w-8"><span class="inline-flex items-center justify-center w-5 h-5 rounded-full bg-gray-100 text-[10px] font-bold text-gray-500">${rowIdx}</span></td>
                                <td class="px-4 py-1.5 text-sm text-gray-700">${nameHtml}</td>
                             </tr>`;
                });
            });
            
            html += `</tbody></table></div>`;
            container.innerHTML = html;

            // 同步到 Tab 视图表格
            if (containerTab) {
                containerTab.innerHTML = html;
                const exportBtnTab = containerTab.querySelector('#exportBtn');
                if (exportBtnTab) exportBtnTab.onclick = exportXLSX;
            }

            // 绑定导出按钮事件
            document.getElementById('exportBtn').onclick = exportXLSX;
        }

        // XLSX 导出
        function exportXLSX() {
            if (!currentData) return;
            
            const rows = [];
            const merges = [];
            const styles = [];
            
            // 表头样式
            const headerStyle = {
                font: { bold: true, color: { rgb: "FFFFFF" }, size: 11, name: "微软雅黑" },
                fill: { fgColor: { rgb: "2563EB" } },
                alignment: { horizontal: "center", vertical: "center" },
                border: {
                    bottom: { style: "thin", color: { rgb: "1D4ED8" } }
                }
            };
            
            // 日期单元格样式
            const dateStyle = {
                font: { bold: true, color: { rgb: "2563EB" }, size: 10, name: "微软雅黑" },
                fill: { fgColor: { rgb: "EFF6FF" } },
                alignment: { horizontal: "center", vertical: "center", wrapText: true },
                border: {
                    right: { style: "thin", color: { rgb: "DBEAFE" } }
                }
            };
            
            // 内容单元格样式
            const contentStyle = {
                font: { size: 10, name: "微软雅黑" },
                alignment: { vertical: "center", wrapText: true },
                border: {
                    bottom: { style: "thin", color: { rgb: "E5E7EB" } }
                }
            };
            
            // 事件内容样式（交通信息高亮）
            const transportStyle = {
                font: { size: 10, name: "微软雅黑", color: { rgb: "1E40AF" } },
                alignment: { vertical: "center", wrapText: true },
                border: {
                    bottom: { style: "thin", color: { rgb: "E5E7EB" } }
                }
            };

            // 添加表头
            rows.push(["日期/计划", "#", "事件内容"]);
            styles.push([headerStyle, headerStyle, headerStyle]);
            
            var xlRowIdx = 0;
            currentData.daily_summaries.forEach(day => {
                const startRow = rows.length;
                day.events.forEach((event, index) => {
                    xlRowIdx++;
                    const planName = (index === 0) ? day.day_plan_name : "";
                    let displayName = event.name;
                    if (event.note && event.note.trim() !== "") {
                        displayName += ` (${event.note})`;
                    }
                    let hasTransport = false;
                    if (event.transport_num) {
                        const startTime = formatTime(event.transport_start_time);
                        const endTime = formatTime(event.transport_end_time);
                        displayName += `  ${event.transport_num}  ${startTime}-${endTime}`;
                        hasTransport = true;
                    }
                    rows.push([planName, xlRowIdx, displayName]);
                    styles.push([dateStyle, { font: { size: 10, name: "微软雅黑", color: { rgb: "6B7280" } }, alignment: { horizontal: "center", vertical: "center" }, border: { bottom: { style: "thin", color: { rgb: "E5E7EB" } } } }, hasTransport ? transportStyle : contentStyle]);
                });
                // 合并日期列
                if (day.events.length > 1) {
                    merges.push({ s: { r: startRow, c: 0 }, e: { r: startRow + day.events.length - 1, c: 0 } });
                }
            });

            const ws = XLSX.utils.aoa_to_sheet(rows);
            
            // 应用合并单元格
            ws['!merges'] = merges;
            
            // 设置列宽
            ws['!cols'] = [
                { wch: 16 },  // 日期列
                { wch: 5 },   // # 列
                { wch: 60 }   // 内容列
            ];
            
            // 应用单元格样式
            for (let r = 0; r < rows.length; r++) {
                for (let c = 0; c < rows[r].length; c++) {
                    const cell = XLSX.utils.encode_cell({ r, c });
                    if (!ws[cell]) ws[cell] = { v: rows[r][c] };
                    ws[cell].s = styles[r][c];
                }
            }
            
            // 设置行高
            ws['!rows'] = rows.map((_, i) => i === 0 ? { hpt: 28 } : { hpt: 22 });
            
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "行程");
            XLSX.writeFile(wb, `${currentData.journey_name}.xlsx`);
        }

        // 加载缓存行程
        document.getElementById('loadCacheBtn').onclick = async () => {
            const journeyId = document.getElementById('cacheSelector').value;
            if (!journeyId) {
                showToast("请先选择一个行程");
                return;
            }
            try {
                const res = await fetch(`/api/journey/summary?journey_id=${journeyId}`);
                renderSummaryTable(await res.json());
                onJourneyLoaded(journeyId);
            } catch (e) {
                showToast("加载行程失败: " + e.message);
            }
        };

        // 解析新行程
        document.getElementById('fetchUrlBtn').onclick = async () => {
            const url = document.getElementById('urlInput').value.trim();
            const match = url.match(/(?:detail\/|journey_id=)(\d+)/);
            const journeyId = match ? match[1] : (/^\d+$/.test(url) ? url : null);

            if (!journeyId) {
                showToast("请输入有效的行程链接或数字ID");
                return;
            }

            try {
                const response = await fetch(`/api/journey?journey_id=${journeyId}&force_refresh=${document.getElementById('forceRefresh').checked}`);
                const result = await response.json();

                if (result.error) {
                    showToast(result.error);
                    return;
                }

                const res = await fetch(`/api/journey/summary?journey_id=${journeyId}`);
                renderSummaryTable(await res.json());
                loadCacheList();
                onJourneyLoaded(journeyId);
            } catch (e) {
                showToast("解析行程失败: " + e.message);
            }
        };

        // ========== 地图模块 ==========
        let map = null;
        let currentMapData = null;
        const DAY_COLORS = [
            '#3B82F6','#EF4444','#10B981','#F59E0B','#8B5CF6',
            '#EC4899','#06B6D4','#84CC16','#F97316','#6366F1'
        ];
        const ROUTE_STYLES = {
            flight:  { color: '#3B82F6', width: 2.5, dasharray: [8, 4] },
            train:   { color: '#10B981', width: 3, dasharray: null },
            driving: { color: '#F59E0B', width: 3, dasharray: null },
            walking: { color: '#9CA3AF', width: 1.5, dasharray: [4, 3] },
            transfer:{ color: '#8B5CF6', width: 2, dasharray: [6, 3] },
            car:     { color: '#F59E0B', width: 3, dasharray: null },
        };

        // --- eviltransform: GCJ-02 → WGS-84 ---
        const _etEarthR = 6378137.0;
        function _etOutOfChina(lat, lng) {
            return lng < 72.004 || lng > 137.8347 || lat < 0.8293 || lat > 55.8271;
        }
        function _etTransform(x, y) {
            var xy = x * y, absX = Math.sqrt(Math.abs(x));
            var xPi = x * Math.PI, yPi = y * Math.PI;
            var d = 20*Math.sin(6*xPi) + 20*Math.sin(2*xPi);
            var lat = d + 20*Math.sin(yPi) + 40*Math.sin(yPi/3);
            var lng = d + 20*Math.sin(xPi) + 40*Math.sin(xPi/3);
            lat += 160*Math.sin(yPi/12) + 320*Math.sin(yPi/30);
            lng += 150*Math.sin(xPi/12) + 300*Math.sin(xPi/30);
            lat *= 2/3; lng *= 2/3;
            lat += -100 + 2*x + 3*y + 0.2*y*y + 0.1*xy + 0.2*Math.sqrt(absX);
            lng += 300 + x + 2*y + 0.1*x*x + 0.1*xy + 0.1*Math.sqrt(absX);
            return { lat, lng };
        }
        function _etDelta(lat, lng) {
            var ee = 0.00669342162296594323;
            var d = _etTransform(lng - 105, lat - 35);
            var radLat = lat / 180 * Math.PI;
            var magic = Math.sin(radLat);
            magic = 1 - ee * magic * magic;
            var sqrtM = Math.sqrt(magic);
            d.lat = (d.lat * 180) / ((_etEarthR * (1 - ee)) / (magic * sqrtM) * Math.PI);
            d.lng = (d.lng * 180) / (_etEarthR / sqrtM * Math.cos(radLat) * Math.PI);
            return d;
        }
        function gcj2wgs(gcjLat, gcjLng) {
            if (_etOutOfChina(gcjLat, gcjLng)) return { lat: gcjLat, lng: gcjLng };
            var d = _etDelta(gcjLat, gcjLng);
            return { lat: gcjLat - d.lat, lng: gcjLng - d.lng };
        }
        function toWGS(lat, lng, coordType) {
            if (coordType === 'GCJ02') {
                var r = gcj2wgs(lat, lng);
                return [r.lng, r.lat];
            }
            return [lng, lat];
        }

        // --- 大圆弧（飞机航线）---
        function greatCircleArc(start, end, n = 50) {
            var coords = [];
            var toRad = Math.PI / 180;
            var lat1 = start[1] * toRad, lng1 = start[0] * toRad;
            var lat2 = end[1] * toRad, lng2 = end[0] * toRad;
            var d = 2 * Math.asin(Math.sqrt(
                Math.pow(Math.sin((lat2-lat1)/2), 2) +
                Math.cos(lat1) * Math.cos(lat2) * Math.pow(Math.sin((lng2-lng1)/2), 2)
            ));
            if (d < 0.0001) return [start, end];
            for (var i = 0; i <= n; i++) {
                var f = i / n;
                var A = Math.sin((1-f)*d) / Math.sin(d);
                var B = Math.sin(f*d) / Math.sin(d);
                var x = A * Math.cos(lat1) * Math.cos(lng1) + B * Math.cos(lat2) * Math.cos(lng2);
                var y = A * Math.cos(lat1) * Math.sin(lng1) + B * Math.cos(lat2) * Math.sin(lng2);
                var z = A * Math.sin(lat1) + B * Math.sin(lat2);
                coords.push([Math.atan2(y, x) / toRad, Math.atan2(z, Math.sqrt(x*x + y*y)) / toRad]);
            }
            return coords;
        }

        // --- Haversine 距离 ---
        function haverDist(a, b) {
            var R = 6371000, p = Math.PI / 180;
            var h = 0.5 - Math.cos((b[1]-a[1])*p)/2 + Math.cos(a[1]*p)*Math.cos(b[1]*p)*(1-Math.cos((b[0]-a[0])*p))/2;
            return 2 * R * Math.asin(Math.sqrt(h));
        }

        // --- OSRM 路由 ---
        const _osrmCache = {};
        async function fetchOSRM(start, end) {
            var key = start[0]+','+start[1]+';'+end[0]+','+end[1];
            if (_osrmCache[key]) return _osrmCache[key];
            try {
                var url = `https://router.project-osrm.org/route/v1/driving/${start[0]},${start[1]};${end[0]},${end[1]}?overview=full&geometries=geojson`;
                var res = await fetch(url);
                var data = await res.json();
                if (data.code === 'Ok' && data.routes.length) {
                    var coords = data.routes[0].geometry.coordinates;
                    _osrmCache[key] = coords;
                    return coords;
                }
            } catch (e) { console.warn('OSRM failed:', e); }
            return [start, end];
        }

        // --- 初始化地图 ---
        var mapReady = null;
        function initMap() {
            if (map) return mapReady;
            map = new maplibregl.Map({
                container: 'map',
                style: 'https://tiles.openfreemap.org/styles/liberty',
                center: [10, 48],
                zoom: 4
            });
            map.addControl(new maplibregl.NavigationControl());
            map.addControl(new maplibregl.ScaleControl());
            mapReady = new Promise(resolve => map.on('load', resolve));
            return mapReady;
        }

        // --- 清除地图图层 ---
        function clearMapLayers() {
            if (!map || !map.isStyleLoaded()) return;
            var style = map.getStyle();
            if (!style) return;
            var srcIds = [];
            style.sources && Object.keys(style.sources).forEach(k => {
                if (k.startsWith('route-')) srcIds.push(k);
            });
            style.layers && style.layers.forEach(l => {
                if (l.id && l.id.startsWith('route-')) {
                    map.removeLayer(l.id);
                }
            });
            srcIds.forEach(id => { try { map.removeSource(id); } catch(e){} });
            // 移除旧 DOM markers
            _markers.forEach(m => m.remove());
            _markers = [];
        }

        // --- 加载地图数据并绘制 ---
        async function loadMapData(journeyId) {
            try {
                var res = await fetch(`/api/journey/map?journey_id=${journeyId}`);
                var data = await res.json();
                if (data.error) return;
                currentMapData = data;
                // Re-render table with coordinates now available
                if (currentData) renderSummaryTable(currentData);
                await initMap();
                buildDayFilter();
                clearMapLayers();
                await renderMap();
            } catch (e) {
                console.error('加载地图数据失败:', e);
            }
        }

        // --- 渲染地图（带筛选，DOM marker + 路线合并） ---
        var poiIdx = 0;
        var _markers = [];

        async function renderMap(skipFitBounds) {
            if (!map || !currentMapData) return;
            clearMapLayers();
            var filterEl = document.getElementById('dayFilter');
            var checkedDays = new Set();
            filterEl.querySelectorAll('input[type=checkbox]:checked').forEach(cb => checkedDays.add(cb.value));

            var allCoords = [];
            poiIdx = 0;
            var routeMap = new Map(); // mode → [{ from, to }]

            for (var di = 0; di < currentMapData.days.length; di++) {
                if (!checkedDays.has(String(di))) continue;
                var day = currentMapData.days[di];
                var events = day.events;
                for (var ei = 0; ei < events.length; ei++) {
                    var ev = events[ei];
                    if (ev.start) {
                        var c = toWGS(ev.start.lat, ev.start.lng, ev.start.coord_type);
                        allCoords.push(c);
                        poiIdx++;
                        addMarker(ev.start, String(poiIdx), di, ev);
                    }
                    if (ev.transport_mode) {
                        var mode = ev.transport_mode;
                        if (!routeMap.has(mode)) routeMap.set(mode, []);
                        if (ev.event_type === 201 && ev.end) {
                            var from = toWGS(ev.start.lat, ev.start.lng, ev.start.coord_type);
                            var to = toWGS(ev.end.lat, ev.end.lng, ev.end.coord_type);
                            routeMap.get(mode).push({ from, to });
                        } else if (ei < events.length - 1) {
                            var nextEv = events[ei + 1];
                            if (nextEv.start) {
                                var from2 = toWGS(ev.start.lat, ev.start.lng, ev.start.coord_type);
                                var to2 = toWGS(nextEv.start.lat, nextEv.start.lng, nextEv.start.coord_type);
                                routeMap.get(mode).push({ from: from2, to: to2 });
                            }
                        }
                    }
                }
            }

            // 批量添加路线（按 mode 合并为 MultiLineString）
            var routeModePromises = [];
            routeMap.forEach((segments, mode) => {
                routeModePromises.push(addMergedRoute(segments, mode));
            });
            await Promise.all(routeModePromises);

            if (!skipFitBounds && allCoords.length > 0) {
                var bounds = new maplibregl.LngLatBounds();
                allCoords.forEach(c => bounds.extend(c));
                map.fitBounds(bounds, { padding: 40, maxZoom: 12 });
            }
        }

        // --- 添加标记点（DOM marker） ---
        function addMarker(poi, label, dayIdx, event) {
            if (!poi) return;
            var coords = toWGS(poi.lat, poi.lng, poi.coord_type);
            var color = DAY_COLORS[dayIdx % DAY_COLORS.length];
            var el = document.createElement('div');
            el.style.cssText = `background:${color};color:#fff;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:bold;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.3);cursor:pointer;line-height:1;`;
            el.textContent = label;

            var popupHtml = `<div style="font-size:13px;max-width:220px">`
                + `<b>${poi.name}</b>`
                + (event.transport_num ? `<br><span style="color:#2563eb">${event.transport_num}</span>` : '')
                + `</div>`;

            var marker = new maplibregl.Marker({ element: el })
                .setLngLat(coords)
                .setPopup(new maplibregl.Popup({ offset: 10 }).setHTML(popupHtml))
                .addTo(map);
            _markers.push(marker);
        }

        // --- 按交通模式批量合并路线 ---
        async function addMergedRoute(segments, mode) {
            if (!segments.length) return;
            var style = ROUTE_STYLES[mode] || ROUTE_STYLES.driving;
            // 并行获取所有 OSRM 路由
            var coordsList = await Promise.all(segments.map(s =>
                mode === 'flight' ? Promise.resolve(greatCircleArc(s.from, s.to)) : fetchOSRM(s.from, s.to)
            ));
            // 合并为 MultiLineString
            var lines = coordsList.filter(c => c && c.length >= 2);
            if (!lines.length) return;
            var srcId = 'route-' + mode;
            map.addSource(srcId, {
                type: 'geojson',
                data: {
                    type: 'Feature',
                    geometry: { type: 'MultiLineString', coordinates: lines }
                }
            });
            map.addLayer({
                id: srcId,
                type: 'line',
                source: srcId,
                paint: {
                    'line-color': style.color,
                    'line-width': style.width,
                    'line-dasharray': style.dasharray || [1],
                }
            });
        }

        // --- 构建日期筛选器 ---
        function buildDayFilter() {
            if (!currentMapData) return;
            var el = document.getElementById('dayFilter');
            el.innerHTML = '';
            currentMapData.days.forEach((day, i) => {
                var cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.value = String(i);
                cb.checked = true;
                cb.className = 'rounded text-blue-600';
                cb.id = 'daycb-' + i;
                cb.onchange = () => renderMap();

                // 日期标签容器（复选框 + 可点击标签）
                var wrap = document.createElement('span');
                wrap.className = 'inline-flex items-center mr-2';

                var label = document.createElement('label');
                label.htmlFor = cb.id;
                label.className = 'day-label text-xs cursor-pointer whitespace-nowrap';
                label.style.cssText = 'color:#E0E7FF;';
                label.textContent = day.day_plan_name.split(' ')[0];
                label.onmouseenter = () => label.style.color = '#fff';
                label.onmouseleave = () => label.style.color = '#E0E7FF';
                label.onclick = (e) => {
                    e.preventDefault();
                    flyToDay(i);
                };

                // 点击日期标签 → 跳转到该天的POI
                var jumpBtn = document.createElement('button');
                jumpBtn.textContent = '📍';
                jumpBtn.title = '定位到 ' + day.day_plan_name;
                jumpBtn.className = 'ml-0.5 text-xs cursor-pointer bg-transparent border-none';
                jumpBtn.style.cssText = 'color:#93C5FD;font-size:10px;';
                jumpBtn.onmouseenter = () => jumpBtn.style.color = '#fff';
                jumpBtn.onmouseleave = () => jumpBtn.style.color = '#93C5FD';
                jumpBtn.onclick = (e) => {
                    e.preventDefault();
                    flyToDay(i);
                };

                wrap.appendChild(cb);
                wrap.appendChild(label);
                wrap.appendChild(jumpBtn);
                el.appendChild(wrap);
            });

            // 全选/全不选按钮
            document.getElementById('selectAllBtn').onclick = () => {
                el.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = true);
                renderMap();
            };
            document.getElementById('deselectAllBtn').onclick = () => {
                el.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = false);
                renderMap();
            };
        }

        // --- 跳转到指定天的POI ---
        function flyToDay(dayIdx) {
            if (!map || !currentMapData) return;
            var needRender = false;
            var cb = document.getElementById('daycb-' + dayIdx);
            if (cb && !cb.checked) {
                cb.checked = true;
                needRender = true;
            }
            var day = currentMapData.days[dayIdx];
            if (!day) return;
            var coords = [];
            day.events.forEach(ev => {
                if (ev.start) {
                    coords.push(toWGS(ev.start.lat, ev.start.lng, ev.start.coord_type));
                }
            });
            if (coords.length === 0) return;
            if (coords.length === 1) {
                map.flyTo({ center: coords[0], zoom: 14, essential: true });
            } else {
                var bounds = new maplibregl.LngLatBounds();
                coords.forEach(c => bounds.extend(c));
                map.fitBounds(bounds, { padding: 60, maxZoom: 15 });
            }
            if (needRender) renderMap(true); // fly 已经启动，异步补渲染，不 fitBounds
            // 滚动表格到该天
            scrollToDay(dayIdx);
        }

        function flyToPoi(lat, lng, coordType, dayIdx) {
            if (!map) return;
            var needRender = false;
            if (dayIdx !== undefined) {
                var cb = document.getElementById('daycb-' + dayIdx);
                if (cb && !cb.checked) {
                    cb.checked = true;
                    needRender = true;
                }
            }
            var coords = toWGS(lat, lng, coordType);
            map.flyTo({ center: coords, zoom: 15, essential: true });
            if (needRender) renderMap(true); // fly 已经启动，异步补渲染，不 fitBounds
        }

        // --- 滚动表格到指定天 ---
        function scrollToDay(dayIdx) {
            var id = 'day-row-' + dayIdx;
            var target = null;
            if (currentTab === 'table') {
                target = document.getElementById('summaryContainerTab').querySelector('#' + id);
            } else {
                target = document.getElementById(id);
            }
            if (target) {
                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // ========== 面板拖动分隔条 ==========
        (function initResizer() {
            var resizer = document.getElementById('panelResizer');
            var tableWrap = document.getElementById('tableWrap');
            var dualView = document.getElementById('dualView');
            var isDragging = false;

            function onPointerDown(e) {
                isDragging = true;
                resizer.classList.add('active');
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';
                // 阻止地图接收事件
                document.getElementById('mapWrap').style.pointerEvents = 'none';
                e.preventDefault();
            }

            function onPointerMove(e) {
                if (!isDragging) return;
                var rect = dualView.getBoundingClientRect();
                var x = e.clientX - rect.left;
                var pct = (x / rect.width) * 100;
                pct = Math.max(20, Math.min(80, pct)); // 限制 20%~80%
                tableWrap.style.width = pct + '%';
            }

            function onPointerUp() {
                if (!isDragging) return;
                isDragging = false;
                resizer.classList.remove('active');
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
                document.getElementById('mapWrap').style.pointerEvents = '';
                if (map) map.resize();
            }

            resizer.addEventListener('pointerdown', onPointerDown);
            document.addEventListener('pointermove', onPointerMove);
            document.addEventListener('pointerup', onPointerUp);
        })();

        // ========== 入口：加载行程后同时加载地图 ==========
        var _lastLoadedJourneyId = null;

        function onJourneyLoaded(journeyId) {
            _lastLoadedJourneyId = journeyId;
            loadMapData(journeyId);
        }

        // 输入框回车触发解析
        document.getElementById('urlInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('fetchUrlBtn').click();
            }
        });
    </script>
</body>
